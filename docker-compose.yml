version: '3.8'

services:
  web:
    build: .
    container_name: payout-system
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./payout_system.db:/app/payout_system.db
    environment:
      - DATABASE_URL=sqlite:///./payout_system.db
      - DEBUG=True
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

